# =========================================================================
# WHMS System Testing Database docker-compose
#
# To run this docker-compose with the custom env file, execute:
#   docker compose --env-file docker-compose.env up -d
#
# To stop:
#   docker compose --env-file docker-compose.env down
# =========================================================================

version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: whms_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - whms_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      timeout: 10s
      retries: 5
      interval: 10s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: whms_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PMA_PORT}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  whms_db_data:
    driver: local
